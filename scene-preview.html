<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Doghouse — Studio Scene</title>
<style>
  body { margin: 0; background: #14110d; color: #f4ead5; font-family: "Courier New", monospace; display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px; }
  h1 { font-size: 15px; letter-spacing: 2px; text-transform: uppercase; opacity: .7; margin: 0; }
  .frame { width: 960px; border: 3px solid #2a2018; box-shadow: 8px 8px 0 #000; image-rendering: pixelated; }
  .cap { font-size: 11px; opacity: .5; }
</style>
</head>
<body>
  <h1>Doghouse Productions — studio scene (no characters)</h1>
  <svg class="frame" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision">
    <defs>
      <linearGradient id="dusk" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#f6c98a"/><stop offset="0.45" stop-color="#e6a98e"/>
        <stop offset="0.8" stop-color="#c8a6c8"/><stop offset="1" stop-color="#e7d3a8"/>
      </linearGradient>
      <radialGradient id="sun" cx="0.28" cy="0.42" r="0.5">
        <stop offset="0" stop-color="#fff1cf" stop-opacity="0.95"/><stop offset="0.4" stop-color="#ffd99a" stop-opacity="0.5"/><stop offset="1" stop-color="#ffd99a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="pool" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#ffdf9e" stop-opacity="0.55"/><stop offset="1" stop-color="#ffdf9e" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="softglow" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" stop-color="#fff4d6" stop-opacity="0.95"/><stop offset="1" stop-color="#fff4d6" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#caa05e"/><stop offset="1" stop-color="#b07f42"/>
      </linearGradient>
      <linearGradient id="cyc" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fbf4e3"/><stop offset="1" stop-color="#e9dcc0"/>
      </linearGradient>
      <pattern id="brick" width="64" height="36" patternUnits="userSpaceOnUse">
        <rect width="64" height="36" fill="#b15c3c"/>
        <rect width="64" height="2" y="34" fill="#8c4628"/><rect width="2" height="36" x="62" fill="#8c4628"/>
        <rect width="64" height="2" y="16" fill="#8c4628"/><rect width="2" height="18" x="30" y="18" fill="#8c4628"/>
        <rect width="30" height="14" x="2" y="2" fill="#bb6645"/><rect width="30" height="14" x="34" y="2" fill="#a85535"/>
      </pattern>
      <pattern id="plank" width="120" height="22" patternUnits="userSpaceOnUse">
        <rect width="120" height="22" fill="url(#floor)"/><rect width="120" height="2" y="20" fill="#90672f" opacity="0.6"/>
        <rect width="2" height="22" x="40" fill="#9c6f34" opacity="0.5"/><rect width="2" height="22" x="92" fill="#9c6f34" opacity="0.5"/>
      </pattern>
      <pattern id="foam" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <rect width="26" height="26" fill="#3a3550"/><rect width="13" height="13" fill="#46415e"/><rect width="13" height="13" x="13" y="13" fill="#46415e"/>
      </pattern>
      <filter id="neon" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3"/></filter>
    </defs>

    <!-- wall + sky -->
    <rect width="1280" height="560" fill="#efd9b0"/>
    <!-- window band -->
    <g>
      <rect x="70" y="46" width="1140" height="300" fill="url(#dusk)"/>
      <rect x="70" y="46" width="1140" height="300" fill="url(#sun)"/>
      <!-- skyline -->
      <g fill="#9a86ac" opacity="0.6">
        <rect x="120" y="230" width="70" height="116"/><rect x="210" y="190" width="54" height="156"/>
        <rect x="300" y="250" width="90" height="96"/><rect x="900" y="210" width="60" height="136"/>
        <rect x="980" y="250" width="80" height="96"/><rect x="1080" y="200" width="46" height="146"/>
      </g>
      <!-- palm -->
      <g stroke="#6f5a52" stroke-width="6" fill="none" opacity="0.8"><path d="M760 346 q4 -70 0 -120"/></g>
      <g fill="#5f8a5a" opacity="0.85"><path d="M760 220 q-46 -18 -70 -6 q40 -2 70 14 q-30 -34 -64 -42 q40 8 64 28 q-8 -40 -34 -64 q26 26 34 64 q22 -30 58 -38 q-40 16 -58 42 q40 -10 70 0 q-44 -2 -70 12z"/></g>
      <!-- window frame mullions -->
      <g fill="#2a2018">
        <rect x="70" y="46" width="1140" height="10"/><rect x="70" y="336" width="1140" height="10"/>
        <rect x="70" y="46" width="10" height="300"/><rect x="1200" y="46" width="10" height="300"/>
        <rect x="372" y="46" width="8" height="300"/><rect x="672" y="46" width="8" height="300"/><rect x="972" y="46" width="8" height="300"/>
        <rect x="70" y="190" width="1140" height="6"/>
      </g>
    </g>
    <!-- brick band under windows -->
    <rect x="0" y="346" width="1280" height="214" fill="url(#brick)"/>
    <rect x="0" y="346" width="1280" height="8" fill="#7d3e22"/>

    <!-- string lights -->
    <path d="M40 70 Q360 150 700 96 T1240 84" fill="none" stroke="#3a2c20" stroke-width="3"/>
    <g>
      <circle cx="180" cy="118" r="16" fill="#ffdf9e" opacity="0.35" filter="url(#soft)"/><circle cx="180" cy="118" r="6" fill="#ffd86b"/>
      <circle cx="360" cy="132" r="16" fill="#ffdf9e" opacity="0.35" filter="url(#soft)"/><circle cx="360" cy="132" r="6" fill="#ffd86b"/>
      <circle cx="560" cy="118" r="16" fill="#ffdf9e" opacity="0.35" filter="url(#soft)"/><circle cx="560" cy="118" r="6" fill="#ffd86b"/>
      <circle cx="760" cy="98" r="16" fill="#ffdf9e" opacity="0.35" filter="url(#soft)"/><circle cx="760" cy="98" r="6" fill="#ffd86b"/>
      <circle cx="980" cy="92" r="16" fill="#ffdf9e" opacity="0.35" filter="url(#soft)"/><circle cx="980" cy="92" r="6" fill="#ffd86b"/>
      <circle cx="1160" cy="86" r="16" fill="#ffdf9e" opacity="0.35" filter="url(#soft)"/><circle cx="1160" cy="86" r="6" fill="#ffd86b"/>
    </g>
    <!-- hanging pothos vines -->
    <g stroke="#4f7a47" stroke-width="4" fill="none">
      <path d="M120 354 q-8 60 6 110"/><path d="M120 354 q14 50 -2 96"/>
    </g>
    <g fill="#6aa05c"><rect x="108" y="400" width="12" height="10" rx="3"/><rect x="124" y="430" width="12" height="10" rx="3"/><rect x="110" y="456" width="12" height="10" rx="3"/></g>

    <!-- floor -->
    <rect x="0" y="560" width="1280" height="160" fill="url(#plank)"/>
    <rect x="0" y="560" width="1280" height="6" fill="#caa05e"/>

    <!-- light pools on floor -->
    <ellipse cx="640" cy="600" rx="260" ry="60" fill="url(#pool)"/>
    <ellipse cx="1095" cy="612" rx="120" ry="34" fill="url(#pool)"/>

    <!-- ====== LEFT: recording booth ====== -->
    <g>
      <rect x="70" y="372" width="250" height="200" rx="10" fill="#241f30"/>
      <rect x="82" y="384" width="226" height="120" rx="6" fill="url(#foam)"/>
      <rect x="82" y="384" width="226" height="120" rx="6" fill="#1f1b2c" opacity="0.18"/>
      <!-- glass reflection -->
      <path d="M96 392 l60 0 -90 110 -16 0z" fill="#ffffff" opacity="0.06"/>
      <!-- mic on boom -->
      <line x1="300" y1="380" x2="220" y2="430" stroke="#1a1622" stroke-width="6"/>
      <rect x="206" y="424" width="20" height="40" rx="9" fill="#cdb8a0" stroke="#1a1622" stroke-width="3"/>
      <rect x="210" y="430" width="12" height="28" fill="#8f7d68"/>
      <!-- ON AIR -->
      <rect x="250" y="392" width="54" height="18" rx="3" fill="#1a1622"/><text x="277" y="405" font-size="11" fill="#ff6a4d" text-anchor="middle" font-family="Courier New">ON AIR</text>
      <circle cx="262" cy="401" r="3" fill="#ff5a3c"/>
      <rect x="70" y="566" width="250" height="8" fill="#1a1622"/>
    </g>

    <!-- ====== CENTER: photo cyclorama nook ====== -->
    <g>
      <path d="M470 572 L470 392 Q470 372 490 372 L800 372 Q820 372 820 392 L820 572 Q640 540 470 572 Z" fill="url(#cyc)"/>
      <path d="M470 540 Q640 512 820 540 L820 572 Q640 540 470 572 Z" fill="#d9c8a4" opacity="0.55"/>
      <!-- softboxes -->
      <g transform="translate(452 398) rotate(18)"><circle cx="0" cy="0" r="70" fill="url(#softglow)"/><rect x="-26" y="-26" width="52" height="52" rx="6" fill="#f7eccf" stroke="#2a2018" stroke-width="3"/><rect x="-18" y="-18" width="36" height="36" fill="#fff7df"/></g>
      <line x1="452" y1="420" x2="452" y2="566" stroke="#2a2018" stroke-width="4"/>
      <g transform="translate(838 404) rotate(-18)"><circle cx="0" cy="0" r="70" fill="url(#softglow)"/><rect x="-26" y="-26" width="52" height="52" rx="6" fill="#f7eccf" stroke="#2a2018" stroke-width="3"/><rect x="-18" y="-18" width="36" height="36" fill="#fff7df"/></g>
      <line x1="838" y1="426" x2="838" y2="566" stroke="#2a2018" stroke-width="4"/>
      <!-- tripod (no camera-person) -->
      <g stroke="#2a2018" stroke-width="4" fill="none"><path d="M645 470 l-16 96 M645 470 l16 96 M645 470 l0 96"/></g>
      <rect x="628" y="452" width="38" height="22" rx="4" fill="#3a3550" stroke="#2a2018" stroke-width="3"/><circle cx="647" cy="463" r="6" fill="#6b5bd2"/>
      <!-- stool -->
      <rect x="712" y="520" width="40" height="10" rx="4" fill="#d2694a" stroke="#2a2018" stroke-width="3"/>
      <g stroke="#2a2018" stroke-width="4"><path d="M718 530 l-6 36 M746 530 l6 36"/></g>
    </g>

    <!-- neon OMNI HOUSE sign (hero) -->
    <g filter="url(#neon)">
      <text x="645" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="46" letter-spacing="1">
        <tspan font-style="italic" fill="#ff7a45">Omni</tspan><tspan dx="14" fill="#ffe08a">House</tspan>
      </text>
    </g>
    <text x="645" y="330" text-anchor="middle" font-family="Georgia, serif" font-size="46" letter-spacing="1" opacity="0.9">
      <tspan font-style="italic" fill="#ffb07a">Omni</tspan><tspan dx="14" fill="#fff0c2">House</tspan>
    </text>
    <rect x="476" y="344" width="338" height="3" rx="1" fill="#ffb27a" opacity="0.55"/>

    <!-- ====== RIGHT: lounge ====== -->
    <g>
      <!-- rug -->
      <ellipse cx="1080" cy="612" rx="170" ry="40" fill="#2a9d8f" opacity="0.85"/>
      <ellipse cx="1080" cy="612" rx="130" ry="30" fill="none" stroke="#1f7d72" stroke-width="4"/>
      <!-- sofa -->
      <rect x="990" y="500" width="200" height="70" rx="14" fill="#d2694a" stroke="#2a2018" stroke-width="3"/>
      <rect x="998" y="494" width="60" height="40" rx="10" fill="#e07b56" stroke="#2a2018" stroke-width="3"/>
      <rect x="1062" y="494" width="60" height="40" rx="10" fill="#e07b56" stroke="#2a2018" stroke-width="3"/>
      <rect x="1126" y="494" width="60" height="40" rx="10" fill="#e07b56" stroke="#2a2018" stroke-width="3"/>
      <rect x="980" y="512" width="22" height="58" rx="8" fill="#c25c3f" stroke="#2a2018" stroke-width="3"/>
      <rect x="1178" y="512" width="22" height="58" rx="8" fill="#c25c3f" stroke="#2a2018" stroke-width="3"/>
      <!-- coffee table + mug -->
      <rect x="1030" y="588" width="100" height="14" rx="4" fill="#9c6532" stroke="#2a2018" stroke-width="3"/>
      <rect x="1050" y="576" width="14" height="14" rx="3" fill="#f4ead5" stroke="#2a2018" stroke-width="2"/>
      <!-- monstera -->
      <g stroke="#2a2018" stroke-width="3"><rect x="1196" y="470" width="40" height="40" rx="6" fill="#c98a4b"/></g>
      <g fill="#4f8a4c" stroke="#2f5f30" stroke-width="2">
        <path d="M1216 470 q-60 -30 -54 -100 q40 30 54 100z"/><path d="M1216 470 q56 -26 58 -92 q-44 26 -58 92z"/>
        <path d="M1216 470 q-8 -64 6 -116 q22 56 -6 116z"/>
      </g>
      <g fill="#3f7340"><circle cx="1180" cy="408" r="3"/><circle cx="1252" cy="416" r="3"/><circle cx="1222" cy="378" r="3"/></g>
    </g>

    <!-- ====== FOREGROUND: operator desk ====== -->
    <g>
      <rect x="150" y="600" width="230" height="92" rx="6" fill="#b07f42" stroke="#2a2018" stroke-width="3"/>
      <rect x="150" y="600" width="230" height="12" fill="#caa05e"/>
      <!-- monitor -->
      <rect x="196" y="556" width="120" height="74" rx="6" fill="#2a2018"/>
      <rect x="204" y="564" width="104" height="58" rx="3" fill="#1d2a2a"/>
      <rect x="212" y="572" width="60" height="6" fill="#2a9d8f"/><rect x="212" y="584" width="84" height="4" fill="#5c6b6b"/><rect x="212" y="592" width="40" height="4" fill="#e8643c"/><rect x="212" y="600" width="70" height="4" fill="#5c6b6b"/>
      <rect x="250" y="630" width="12" height="14" fill="#2a2018"/><rect x="232" y="644" width="48" height="6" rx="3" fill="#2a2018"/>
      <!-- desk lamp + glow -->
      <circle cx="345" cy="600" r="46" fill="url(#pool)"/>
      <g stroke="#2a2018" stroke-width="4" fill="none"><path d="M352 600 l0 -36 l-20 -16"/></g>
      <rect x="316" y="540" width="26" height="14" rx="6" fill="#e8643c" stroke="#2a2018" stroke-width="3"/>
      <!-- mug -->
      <rect x="158" y="582" width="16" height="18" rx="3" fill="#2a9d8f" stroke="#2a2018" stroke-width="2"/>
    </g>

    <!-- vignette -->
    <rect width="1280" height="720" fill="url(#sun)" opacity="0.0"/>
    <radialGradient id="vig" cx="0.5" cy="0.46" r="0.75"><stop offset="0.6" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#1a120a" stop-opacity="0.4"/></radialGradient>
    <rect width="1280" height="720" fill="url(#vig)"/>
  </svg>
  <div class="cap">hi-bit cozy · warm cream + terracotta + teal · Omni neon hero · capsule-ready 16:9</div>
</body>
</html>
